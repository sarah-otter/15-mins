<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>15 Minutes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --lime:     #CCFF00;
  --orange:   #FF6B00;
  --pink:     #F900FF;
  --violet:   #5200FF;
  --black:    #0A0A0A;
  --white:    #FFFFFF;
  --offwhite: #F7F7F2;
  --gray:     #E8E8E0;
  --muted:    #999990;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--offwhite);
  font-family: 'DM Sans', sans-serif;
  color: var(--black);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* ── APP SHELL ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 430px;
  margin: 0 auto;
  background: var(--white);
  position: relative;
  overflow: hidden;
}

/* ── HEADER ── */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 22px 10px;
  background: var(--white);
  flex-shrink: 0;
  border-bottom: 1px solid var(--gray);
  z-index: 10;
}
.logo-lockup { display: flex; align-items: center; gap: 10px; }
.logo-svg { width: 36px; height: 36px; }
.app-name {
  font-family: 'Playfair Display', serif;
  font-size: 19px; font-weight: 700;
  color: var(--black); line-height: 1;
}
.user-pill {
  display: flex; align-items: center; gap: 8px;
  background: var(--offwhite); border-radius: 20px;
  padding: 5px 12px 5px 5px;
  cursor: pointer; border: 2px solid transparent;
  transition: border-color 0.2s;
}
.user-pill:active { border-color: var(--black); }
.user-dot {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; color: var(--black);
}
.user-name { font-size: 12px; font-weight: 600; }

/* ── TABS ── */
.tabs {
  display: flex; margin: 8px 22px;
  background: var(--gray); border-radius: 14px; padding: 4px;
  flex-shrink: 0;
}
.tab {
  flex: 1; text-align: center;
  padding: 9px; font-size: 13px; font-weight: 500;
  color: var(--muted); border-radius: 11px; cursor: pointer;
  transition: all 0.2s;
}
.tab.active { background: var(--black); color: var(--white); font-weight: 700; }

/* ── SCROLL AREA ── */
.tab-panel { display: none; flex: 1; overflow-y: auto; padding: 14px 22px 60px; flex-direction: column; gap: 14px; scrollbar-width: none; }
.tab-panel::-webkit-scrollbar { display: none; }
.tab-panel.active { display: flex; }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); margin-bottom: -4px;
}

/* ── WELCOME BANNER ── */
.welcome-banner {
  background: var(--black); border-radius: 22px;
  padding: 20px 20px 20px 22px;
  display: flex; align-items: center; justify-content: space-between;
  overflow: hidden; position: relative;
}
.welcome-banner::before {
  content: ''; position: absolute;
  top: -30px; right: -20px;
  width: 120px; height: 120px; border-radius: 50%;
  background: var(--lime); opacity: 0.18;
}
.welcome-text .greeting {
  font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,0.55); margin-bottom: 4px;
}
.welcome-text .headline {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 900;
  line-height: 1.1; color: var(--white);
}
.welcome-text .headline span { color: var(--lime); }
.welcome-illo { width: 64px; height: 64px; flex-shrink: 0; }

/* ── TIMER ── */
.timer-block {
  border: 2.5px solid var(--black); border-radius: 22px;
  padding: 16px 18px;
  display: flex; align-items: center; justify-content: space-between;
  position: relative; overflow: hidden; background: var(--white);
}
.timer-progress-bar {
  position: absolute; bottom: 0; left: 0;
  height: 4px; background: var(--lime);
  border-radius: 0 2px 0 0;
  transition: width 0.5s linear;
  width: 0%;
}
.timer-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
.timer-digits {
  font-family: 'Playfair Display', serif;
  font-size: 40px; font-weight: 700; line-height: 1; color: var(--black);
}
.timer-hint { font-size: 11px; color: var(--muted); margin-top: 2px; }
.timer-play {
  width: 54px; height: 54px;
  background: var(--black); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: transform 0.15s;
}
.timer-play:active { transform: scale(0.93); }

/* ── CARD STACK ── */
.card-stack-wrap { position: relative; height: 210px; touch-action: none; }
.chore-card {
  position: absolute; width: 100%;
  border-radius: 24px; overflow: hidden;
  border: 2.5px solid var(--black);
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  will-change: transform;
  cursor: grab;
  user-select: none;
}
.chore-card.back2 { transform: scale(0.92) translateY(14px); z-index: 1; background: var(--pink); opacity: 0.5; }
.chore-card.back1 { transform: scale(0.96) translateY(8px); z-index: 2; background: var(--orange); opacity: 0.75; }
.chore-card.front { z-index: 3; background: var(--lime); }
.chore-card.animating { transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.4s; }

.card-inner { padding: 20px 20px 16px; display: flex; flex-direction: column; gap: 0; }
.card-freq-tag {
  display: inline-flex; align-items: center;
  background: var(--black); color: var(--lime);
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 4px 10px; border-radius: 20px;
  align-self: flex-start; margin-bottom: 10px;
}
.card-chore-name {
  font-family: 'Playfair Display', serif;
  font-size: 30px; font-weight: 900;
  color: var(--black); line-height: 1.05; margin-bottom: 14px;
}
.card-meta-line { font-size: 12px; font-weight: 500; color: rgba(0,0,0,0.55); }
.card-meta-line strong { color: var(--black); font-weight: 700; }

/* swipe actions overlay */
.swipe-action-overlay {
  position: absolute; inset: 0; border-radius: 22px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 28px; font-weight: 900;
  opacity: 0; pointer-events: none;
  transition: opacity 0.1s;
  z-index: 10;
}
.swipe-action-overlay.done-hint { background: rgba(82,0,255,0.85); color: var(--white); }
.swipe-action-overlay.skip-hint { background: rgba(0,0,0,0.7); color: var(--lime); }

/* swipe bar */
.swipe-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 10px;
}
.swipe-hint {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted);
}
.swipe-hint.done { color: var(--violet); }
.swipe-dots { display: flex; gap: 4px; align-items: center; }
.swipe-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gray); }
.swipe-dot.active { background: var(--black); width: 16px; border-radius: 3px; }

/* ── NEXT UP ── */
.next-up-list { display: flex; flex-direction: column; gap: 8px; }
.next-up-item {
  background: var(--white); border-radius: 16px;
  padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
  border: 2px solid var(--black);
}
.nup-info { flex: 1; }
.nup-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.nup-sub { font-size: 11px; color: var(--muted); }
.nup-due {
  font-size: 12px; font-weight: 700; color: var(--black);
  background: var(--offwhite); border-radius: 20px;
  padding: 5px 12px; white-space: nowrap; flex-shrink: 0; margin-left: 12px;
}
.nup-due.overdue { background: var(--orange); color: var(--white); }

/* ── ALL DONE STATE ── */
.all-done-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 210px; gap: 12px; text-align: center;
  background: var(--offwhite); border-radius: 24px; border: 2.5px dashed var(--gray);
}
.all-done-state .ad-emoji { font-size: 48px; }
.all-done-state .ad-title {
  font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900;
}
.all-done-state .ad-sub { font-size: 13px; color: var(--muted); }

/* ── HISTORY ── */
.tally-row { display: flex; gap: 10px; }
.tally-card {
  flex: 1; border-radius: 22px; padding: 18px 16px;
  border: 2.5px solid var(--black);
  display: flex; flex-direction: column; gap: 8px;
}
.tally-card.sarah { background: var(--lime); }
.tally-card.anthony { background: var(--violet); color: var(--white); }
.tally-person { display: flex; align-items: center; gap: 8px; }
.tally-av {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800;
}
.tally-card.sarah .tally-av { background: rgba(0,0,0,0.12); color: var(--black); }
.tally-card.anthony .tally-av { background: rgba(255,255,255,0.2); color: var(--white); }
.tally-pname { font-size: 12px; font-weight: 700; }
.tally-num { font-family: 'Playfair Display', serif; font-size: 46px; font-weight: 900; line-height: 1; }
.tally-sub { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.6; }
.tally-bar-bg { height: 5px; border-radius: 3px; background: rgba(0,0,0,0.1); overflow: hidden; margin-top: 2px; }
.tally-card.anthony .tally-bar-bg { background: rgba(255,255,255,0.2); }
.tally-bar-fill { height: 100%; border-radius: 3px; background: var(--black); }
.tally-card.anthony .tally-bar-fill { background: var(--lime); }

.split-wrap {
  background: var(--offwhite); border: 1.5px solid var(--gray); border-radius: 16px; padding: 14px 16px;
}
.split-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.split-bar { display: flex; height: 12px; border-radius: 6px; overflow: hidden; gap: 2px; }
.split-s { background: var(--lime); border-radius: 6px 0 0 6px; }
.split-a { background: var(--violet); border-radius: 0 6px 6px 0; }
.split-labels { display: flex; justify-content: space-between; margin-top: 8px; }
.split-name { font-size: 11px; font-weight: 700; }

.breakdown { background: var(--white); border-radius: 20px; overflow: hidden; border: 1.5px solid var(--gray); }
.bd-head {
  display: grid; grid-template-columns: 1fr 48px 48px 48px;
  padding: 10px 14px; background: var(--black);
}
.bd-hcol {
  font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: rgba(255,255,255,0.5); text-align: center;
}
.bd-hcol:first-child { text-align: left; color: rgba(255,255,255,0.8); }
.bd-row {
  display: grid; grid-template-columns: 1fr 48px 48px 48px;
  padding: 12px 14px; border-bottom: 1px solid var(--gray); align-items: center;
}
.bd-row:last-child { border-bottom: none; }
.bd-name { font-size: 13px; font-weight: 700; }
.bd-freq { font-size: 10px; color: var(--muted); margin-top: 1px; }
.bd-cell { text-align: center; font-size: 13px; font-weight: 700; }
.bd-cell small { display: block; font-size: 9px; font-weight: 400; color: var(--muted); }
.pill { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 800; }
.pill-s { background: var(--lime); color: var(--black); }
.pill-a { background: var(--violet); color: var(--white); }

/* ── LOADING / ERROR ── */
.state-banner {
  margin: 20px; padding: 20px; border-radius: 16px;
  background: var(--offwhite); border: 2px solid var(--gray);
  text-align: center; font-size: 13px; color: var(--muted);
  display: flex; flex-direction: column; gap: 10px; align-items: center;
}
.state-banner .sb-icon { font-size: 32px; }
.state-banner .sb-title { font-weight: 700; color: var(--black); font-size: 15px; }
.config-note {
  font-size: 11px; background: var(--lime);
  border-radius: 10px; padding: 10px 14px;
  border: 2px solid var(--black); margin-top: 4px;
  color: var(--black); font-weight: 500; text-align: left; line-height: 1.5;
}
.config-note strong { display: block; margin-bottom: 4px; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--black); color: var(--white);
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  opacity: 0; pointer-events: none;
  transition: all 0.3s; z-index: 100; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── USER SWITCHER MODAL ── */
#user-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
#user-modal.open { opacity: 1; pointer-events: all; }
.user-modal-sheet {
  background: var(--white); border-radius: 28px 28px 0 0;
  padding: 24px 22px 44px; width: 100%; max-width: 430px;
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
}
#user-modal.open .user-modal-sheet { transform: translateY(0); }
.user-modal-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 16px; text-align: center;
}
.user-opt {
  display: flex; align-items: center; gap: 14px;
  padding: 16px; border-radius: 18px; cursor: pointer;
  border: 2.5px solid var(--gray); margin-bottom: 10px;
  transition: border-color 0.2s, background 0.2s;
}
.user-opt:active { background: var(--offwhite); }
.user-opt.selected { border-color: var(--black); background: var(--offwhite); }
.user-opt-dot {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800; flex-shrink: 0;
}
.user-opt-name { font-size: 16px; font-weight: 700; }

/* ── SPINNER ── */
.spinner {
  width: 24px; height: 24px; border: 3px solid var(--gray);
  border-top-color: var(--black); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <div class="app-header">
    <div class="logo-lockup">
      <svg class="logo-svg" viewBox="0 0 38 38" fill="none">
        <circle cx="19" cy="19" r="18" fill="#CCFF00"/>
        <circle cx="19" cy="19" r="14" fill="white"/>
        <circle cx="19" cy="19" r="14" stroke="#0A0A0A" stroke-width="1.5" fill="none"/>
        <line x1="19" y1="6.5" x2="19" y2="8.5" stroke="#0A0A0A" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="19" y1="29.5" x2="19" y2="31.5" stroke="#0A0A0A" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="6.5" y1="19" x2="8.5" y2="19" stroke="#0A0A0A" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="29.5" y1="19" x2="31.5" y2="19" stroke="#0A0A0A" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="19" y1="19" x2="19" y2="12" stroke="#0A0A0A" stroke-width="2" stroke-linecap="round"/>
        <line x1="19" y1="19" x2="24.5" y2="19" stroke="#0A0A0A" stroke-width="2" stroke-linecap="round"/>
        <circle cx="19" cy="19" r="1.4" fill="#0A0A0A"/>
        <circle cx="15.5" cy="16.5" r="1.4" fill="#0A0A0A"/>
        <circle cx="22.5" cy="16.5" r="1.4" fill="#0A0A0A"/>
        <path d="M14.5 21.5 Q19 25.5 23.5 21.5" stroke="#0A0A0A" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      </svg>
      <span class="app-name">15 minutes</span>
    </div>
    <div class="user-pill" id="user-pill" onclick="openUserModal()">
      <div class="user-dot" id="user-dot">S</div>
      <span class="user-name" id="user-name-label">Sarah</span>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('today')">Today</div>
    <div class="tab" onclick="switchTab('history')">History</div>
  </div>

  <!-- TODAY PANEL -->
  <div class="tab-panel active" id="panel-today">
    <div id="today-loading" class="state-banner">
      <div class="spinner"></div>
      <div class="sb-title">Loading quests…</div>
    </div>
    <div id="today-content" style="display:none; flex-direction:column; gap:14px;">
      <!-- Welcome Banner -->
      <div class="welcome-banner">
        <div class="welcome-text">
          <div class="greeting" id="greeting-text">Good morning, Sarah</div>
          <div class="headline" id="due-count-text"><span id="due-count">0</span> quests<br>due today</div>
        </div>
        <svg class="welcome-illo" viewBox="0 0 68 68" fill="none">
          <circle cx="34" cy="28" r="14" fill="#CCFF00"/>
          <circle cx="30" cy="26" r="1.6" fill="#0A0A0A"/>
          <circle cx="38" cy="26" r="1.6" fill="#0A0A0A"/>
          <path d="M29 31 Q34 35 39 31" stroke="#0A0A0A" stroke-width="1.8" stroke-linecap="round" fill="none"/>
          <line x1="34" y1="28" x2="34" y2="22" stroke="#0A0A0A" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="34" y1="28" x2="38.5" y2="28" stroke="#0A0A0A" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="34" y1="42" x2="34" y2="58" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="24" y="56" width="20" height="6" rx="3" fill="#F900FF"/>
          <line x1="34" y1="46" x2="24" y2="50" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="34" y1="46" x2="44" y2="50" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M56 12 L57 15.5 L60.5 16.5 L57 17.5 L56 21 L55 17.5 L51.5 16.5 L55 15.5 Z" fill="#CCFF00" opacity="0.9"/>
          <path d="M10 8 L10.7 10.2 L13 11 L10.7 11.8 L10 14 L9.3 11.8 L7 11 L9.3 10.2 Z" fill="white" opacity="0.7"/>
        </svg>
      </div>

      <!-- Timer -->
      <div class="timer-block" id="timer-block">
        <div class="timer-progress-bar" id="timer-bar"></div>
        <div>
          <div class="timer-label">Let's do this</div>
          <div class="timer-digits" id="timer-display">15:00</div>
          <div class="timer-hint" id="timer-hint">Don't let your dreams be dreams</div>
        </div>
        <div class="timer-play" id="timer-btn" onclick="toggleTimer()">
          <svg id="timer-icon" width="18" height="22" viewBox="0 0 18 22" fill="none"><path d="M1 1.5L17 11L1 20.5V1.5Z" fill="white"/></svg>
        </div>
      </div>

      <!-- Due Today Cards -->
      <div class="section-label">Due Today</div>
      <div id="due-section">
        <div class="card-stack-wrap" id="card-stack">
          <div class="chore-card back2" id="card-back2"></div>
          <div class="chore-card back1" id="card-back1"></div>
          <div class="chore-card front" id="card-front">
            <div class="swipe-action-overlay done-hint" id="done-overlay"> Done!</div>
            <div class="swipe-action-overlay skip-hint" id="skip-overlay"> Skip</div>
            <div class="card-inner" id="card-content"></div>
          </div>
        </div>
        <div class="swipe-bar">
          <div class="swipe-hint">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M11 6.5H2M2 6.5L5 3.5M2 6.5L5 9.5" stroke="#999990" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Skip
          </div>
          <div class="swipe-dots" id="swipe-dots"></div>
          <div class="swipe-hint done">
            Done
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5h9M11 6.5L8 3.5M11 6.5L8 9.5" stroke="#5200FF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
      </div>

      <!-- Next Up -->
      <div class="section-label">Next Up</div>
      <div class="next-up-list" id="next-up-list"></div>
    </div>
    <div id="today-error" class="state-banner" style="display:none;">
      <div class="sb-icon">⚠️</div>
      <div class="sb-title">Couldn't load data</div>
      <div id="error-msg" style="font-size:12px;"></div>
      <div class="config-note" id="config-hint"></div>
    </div>
  </div>

  <!-- HISTORY PANEL -->
  <div class="tab-panel" id="panel-history">
    <div id="history-loading" class="state-banner">
      <div class="spinner"></div>
      <div class="sb-title">Loading history…</div>
    </div>
    <div id="history-content" style="display:none; flex-direction:column; gap:14px;"></div>
    <div id="history-error" class="state-banner" style="display:none;">
      <div class="sb-icon">⚠️</div>
      <div class="sb-title">Couldn't load history</div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- USER MODAL -->
<div id="user-modal" onclick="closeUserModal(event)">
  <div class="user-modal-sheet">
    <div class="user-modal-title">Switch User</div>
    <div class="user-opt" id="opt-sarah" onclick="selectUser('Sarah')">
      <div class="user-opt-dot" style="background:var(--lime);">S</div>
      <div class="user-opt-name">Sarah</div>
    </div>
    <div class="user-opt" id="opt-anthony" onclick="selectUser('Anthony')">
      <div class="user-opt-dot" style="background:var(--violet); color:white;">A</div>
      <div class="user-opt-name">Anthony</div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
// CONFIG — EDIT THIS SECTION
// ══════════════════════════════════════════════════
const CONFIG = {
  // Paste your Google Apps Script Web App URL here:
  SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxy7BekNVvcs35_wC8G3jbuJ9Qf6IQ0HVDEC8UiTKRUwcqRhPbqLFF7123TFCHlfDV1/exec',
  API_KEY: 'CoolChoreOtter26',
  
  // Set your timezone offset from UTC in hours (e.g. AEST = 10, BST = 1)
  TZ_OFFSET: 10,
};
// ══════════════════════════════════════════════════

// ── STATE ──
let currentUser = localStorage.getItem('15min-user') || 'Sarah';
let dueChores = [];
let nextUpChores = [];
let allChores = [];
let completionLog = [];
let currentCardIndex = 0;

// timer state
let timerRunning = false;
let timerSeconds = 15 * 60;
let timerInterval = null;

// swipe state
let touchStartY = 0, touchStartX = 0;
let isDragging = false;
let cardDragDeltaX = 0;

// ── INIT ──
updateUserUI();
loadData();

// ══════════════════════════════════════════════════
// USER SWITCHING
// ══════════════════════════════════════════════════
function updateUserUI() {
  const isSarah = currentUser === 'Sarah';
  document.getElementById('user-dot').style.background = isSarah ? 'var(--lime)' : 'var(--violet)';
  document.getElementById('user-dot').style.color = isSarah ? 'var(--black)' : 'var(--white)';
  document.getElementById('user-dot').textContent = currentUser[0];
  document.getElementById('user-name-label').textContent = currentUser;
}

function openUserModal() {
  document.getElementById('user-modal').classList.add('open');
  document.getElementById('opt-sarah').classList.toggle('selected', currentUser === 'Sarah');
  document.getElementById('opt-anthony').classList.toggle('selected', currentUser === 'Anthony');
}

function closeUserModal(e) {
  if (e.target === document.getElementById('user-modal')) {
    document.getElementById('user-modal').classList.remove('open');
  }
}

function selectUser(user) {
  currentUser = user;
  localStorage.setItem('15min-user', user);
  document.getElementById('user-modal').classList.remove('open');
  updateUserUI();
  renderToday();
  renderHistory();
  showToast(`Switched to ${user}`);
}

// ══════════════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'today') || (i === 1 && tab === 'history'));
  });
  document.getElementById('panel-today').classList.toggle('active', tab === 'today');
  document.getElementById('panel-history').classList.toggle('active', tab === 'history');
}

// ══════════════════════════════════════════════════
// DATA LOADING
// ══════════════════════════════════════════════════
async function loadData() {
  if (!CONFIG.SCRIPT_URL || CONFIG.SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    showConfigError();
    return;
  }

  try {
    const res = await fetch(CONFIG.SCRIPT_URL + '?action=getData&key=' + CONFIG.API_KEY);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    allChores = data.chores || [];
    completionLog = data.completions || [];

    processChores();
    renderToday();
    renderHistory();
  } catch (err) {
    showError(err.message);
  }
}

function showConfigError() {
  document.getElementById('today-loading').style.display = 'none';
  document.getElementById('history-loading').style.display = 'none';
  const hint = `<strong>Setup needed:</strong>
1. Open <code>config.js</code> (or edit index.html)<br>
2. Set <code>SCRIPT_URL</code> to your Google Apps Script URL<br>
3. See README.md for full setup guide`;
  document.getElementById('today-error').style.display = 'flex';
  document.getElementById('error-msg').textContent = 'Google Sheets not connected yet.';
  document.getElementById('config-hint').innerHTML = hint;
  document.getElementById('history-error').style.display = 'flex';
}

function showError(msg) {
  document.getElementById('today-loading').style.display = 'none';
  document.getElementById('history-loading').style.display = 'none';
  document.getElementById('today-error').style.display = 'flex';
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('config-hint').innerHTML = '<strong>Check that:</strong><br>• Your Apps Script URL is correct<br>• The script is deployed as "Anyone" can access<br>• CORS is enabled in the script';
  document.getElementById('history-error').style.display = 'flex';
}

// ══════════════════════════════════════════════════
// CHORE PROCESSING
// ══════════════════════════════════════════════════
function now() {
  return new Date();
}

function getDaysSince(dateStr) {
  if (!dateStr) return Infinity;
  const d = new Date(dateStr);
  const diff = now() - d;
  return Math.floor(diff / (1000 * 60 * 60 * 24));
}

function formatDaysAgo(dateStr) {
  const days = getDaysSince(dateStr);
  if (days === 0) return 'today';
  if (days === 1) return 'yesterday';
  return `${days} days ago`;
}

function isDueToday(chore, lastCompletion) {
  if (!lastCompletion) return true; // never done
  const daysSince = getDaysSince(lastCompletion.date);
  return daysSince >= chore.frequencyDays;
}

function daysUntilDue(chore, lastCompletion) {
  if (!lastCompletion) return 0;
  const daysSince = getDaysSince(lastCompletion.date);
  return Math.max(0, chore.frequencyDays - daysSince);
}

function getLastCompletion(choreName) {
  const entries = completionLog
    .filter(c => c.chore === choreName)
    .sort((a, b) => new Date(b.date) - new Date(a.date));
  return entries[0] || null;
}

function processChores() {
  const due = [], upcoming = [];

  for (const chore of allChores) {
    const last = getLastCompletion(chore.name);
    if (isDueToday(chore, last)) {
      due.push({ ...chore, lastCompletion: last });
    } else {
      upcoming.push({ ...chore, lastCompletion: last, daysUntil: daysUntilDue(chore, last) });
    }
  }

  // sort upcoming by days until due (soonest first)
  upcoming.sort((a, b) => a.daysUntil - b.daysUntil);

  dueChores = due;
  nextUpChores = upcoming;
  currentCardIndex = 0;
}

// ══════════════════════════════════════════════════
// RENDER TODAY
// ══════════════════════════════════════════════════
function renderToday() {
  document.getElementById('today-loading').style.display = 'none';
  document.getElementById('today-error').style.display = 'none';
  const content = document.getElementById('today-content');
  content.style.display = 'flex';

  // Greeting
  const hour = now().getHours();
  const timeOfDay = hour < 12 ? 'morning' : hour < 17 ? 'afternoon' : 'evening';
  document.getElementById('greeting-text').textContent = `Good ${timeOfDay}, ${currentUser}`;
  
  // Due count
  const count = dueChores.length;
  document.getElementById('due-count').textContent = count;
  document.getElementById('due-count-text').innerHTML = `<span>${count} ${count === 1 ? 'chore' : 'chores'}</span><br>due today`;

  // Card stack
  currentCardIndex = 0;
  renderCardStack();

  // Next up
  renderNextUp();
}

function renderCardStack() {
  const stack = document.getElementById('card-stack');
  const dueSection = document.getElementById('due-section');

  if (dueChores.length === 0) {
    dueSection.innerHTML = `
      <div class="all-done-state">
        <div class="ad-emoji">🎉</div>
        <div class="ad-title">All done!</div>
        <div class="ad-sub">No chores due today. Enjoy your day.</div>
      </div>`;
    return;
  }

  // Render front card
  renderFrontCard(currentCardIndex);

  // Render dots
  renderDots();

  // Setup touch events on front card
  setupCardSwipe();
}

function renderFrontCard(idx) {
  const chore = dueChores[idx];
  if (!chore) return;

  const last = chore.lastCompletion;
  const lastText = last
    ? `Last done by <strong>${last.completedBy}</strong>, ${formatDaysAgo(last.date)}`
    : 'Never done yet';

  document.getElementById('card-content').innerHTML = `
    <div class="card-freq-tag">${chore.frequency}</div>
    <div class="card-chore-name">${chore.name}</div>
    <div class="card-meta-line">${lastText}</div>
  `;

  // Reset card position
  const front = document.getElementById('card-front');
  front.style.transform = '';
  front.style.opacity = '';
  document.getElementById('done-overlay').style.opacity = '0';
  document.getElementById('skip-overlay').style.opacity = '0';
}

function renderDots() {
  const dotsEl = document.getElementById('swipe-dots');
  dotsEl.innerHTML = dueChores.map((_, i) =>
    `<div class="swipe-dot ${i === currentCardIndex ? 'active' : ''}"></div>`
  ).join('');
}

// ── CARD SWIPE ──
function setupCardSwipe() {
  const front = document.getElementById('card-front');
  if (!front) return;

  front.addEventListener('touchstart', onTouchStart, { passive: true });
  front.addEventListener('touchmove', onTouchMove, { passive: false });
  front.addEventListener('touchend', onTouchEnd, { passive: true });
  // Mouse fallback for desktop testing
  front.addEventListener('mousedown', onMouseDown);
}

function onTouchStart(e) {
  touchStartY = e.touches[0].clientY;
  touchStartX = e.touches[0].clientX;
  isDragging = true;
}

function onTouchMove(e) {
  if (!isDragging) return;
  const deltaX = e.touches[0].clientX - touchStartX;
  const deltaY = e.touches[0].clientY - touchStartY;

  // If predominantly horizontal, prevent scroll
  if (Math.abs(deltaX) > Math.abs(deltaY)) {
    e.preventDefault();
    const front = document.getElementById('card-front');
    cardDragDeltaX = deltaX;
    const rotate = deltaX * 0.05;
    front.style.transform = `translateX(${deltaX}px) rotate(${rotate}deg)`;

    const doneOverlay = document.getElementById('done-overlay');
    const skipOverlay = document.getElementById('skip-overlay');
    if (deltaX > 40) {
      doneOverlay.style.opacity = Math.min(1, (deltaX - 40) / 60);
      skipOverlay.style.opacity = '0';
    } else if (deltaX < -40) {
      skipOverlay.style.opacity = Math.min(1, (-deltaX - 40) / 60);
      doneOverlay.style.opacity = '0';
    } else {
      doneOverlay.style.opacity = '0';
      skipOverlay.style.opacity = '0';
    }
  }
}

function onTouchEnd(e) {
  if (!isDragging) return;
  isDragging = false;

  const threshold = 100;
  if (cardDragDeltaX > threshold) {
    markCurrentDone();
  } else if (cardDragDeltaX < -threshold) {
    skipCurrentCard();
  } else {
    // Snap back
    const front = document.getElementById('card-front');
    front.classList.add('animating');
    front.style.transform = '';
    document.getElementById('done-overlay').style.opacity = '0';
    document.getElementById('skip-overlay').style.opacity = '0';
    setTimeout(() => front.classList.remove('animating'), 400);
  }
  cardDragDeltaX = 0;
}

// Mouse support for desktop
let mouseDown = false, mouseStartX = 0;
function onMouseDown(e) {
  mouseDown = true; mouseStartX = e.clientX;
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}
function onMouseMove(e) {
  if (!mouseDown) return;
  const delta = e.clientX - mouseStartX;
  cardDragDeltaX = delta;
  const front = document.getElementById('card-front');
  front.style.transform = `translateX(${delta}px) rotate(${delta*0.05}deg)`;
  const done = document.getElementById('done-overlay');
  const skip = document.getElementById('skip-overlay');
  if (delta > 40) { done.style.opacity = Math.min(1,(delta-40)/60); skip.style.opacity='0'; }
  else if (delta < -40) { skip.style.opacity = Math.min(1,(-delta-40)/60); done.style.opacity='0'; }
  else { done.style.opacity='0'; skip.style.opacity='0'; }
}
function onMouseUp() {
  mouseDown = false;
  document.removeEventListener('mousemove', onMouseMove);
  document.removeEventListener('mouseup', onMouseUp);
  if (cardDragDeltaX > 100) markCurrentDone();
  else if (cardDragDeltaX < -100) skipCurrentCard();
  else {
    const front = document.getElementById('card-front');
    front.classList.add('animating');
    front.style.transform = '';
    document.getElementById('done-overlay').style.opacity='0';
    document.getElementById('skip-overlay').style.opacity='0';
    setTimeout(()=>front.classList.remove('animating'),400);
  }
  cardDragDeltaX = 0;
}

async function markCurrentDone() {
  const chore = dueChores[currentCardIndex];
  if (!chore) return;

  // Animate card flying right
  const front = document.getElementById('card-front');
  front.classList.add('animating');
  front.style.transform = 'translateX(150%) rotate(20deg)';
  front.style.opacity = '0';

  // Optimistically remove
  const choreName = chore.name;
  dueChores.splice(currentCardIndex, 1);
  if (currentCardIndex >= dueChores.length) currentCardIndex = Math.max(0, dueChores.length - 1);

  // Update sheet in background
  try {
    await logCompletion(choreName);
  } catch(e) {
    showToast('Saved locally — sync later');
  }

  setTimeout(() => {
    renderCardStack();
    renderNextUp();
    // Update count
    const count = dueChores.length;
    document.getElementById('due-count').textContent = count;
    document.getElementById('due-count-text').innerHTML = `<span>${count} ${count===1?'chore':'chores'}</span><br>due today`;
    showToast(`✓ ${choreName} done!`);
  }, 380);
}

function skipCurrentCard() {
  if (dueChores.length <= 1) {
    // Snap back
    const front = document.getElementById('card-front');
    front.classList.add('animating');
    front.style.transform = '';
    document.getElementById('skip-overlay').style.opacity = '0';
    setTimeout(() => front.classList.remove('animating'), 400);
    return;
  }
  currentCardIndex = (currentCardIndex + 1) % dueChores.length;
  const front = document.getElementById('card-front');
  front.classList.add('animating');
  front.style.transform = 'translateX(-150%) rotate(-15deg)';
  front.style.opacity = '0';
  setTimeout(() => {
    front.classList.remove('animating');
    renderFrontCard(currentCardIndex);
    renderDots();
    setupCardSwipe();
  }, 350);
}

async function logCompletion(choreName) {
  if (!CONFIG.SCRIPT_URL || CONFIG.SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;
  const today = new Date().toISOString().split('T')[0];
  await fetch(CONFIG.SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'logCompletion', chore: choreName, completedBy: currentUser, date: today, key: CONFIG.API_KEY }),
    mode: 'no-cors',
  });
  // Add to local log
  completionLog.unshift({ chore: choreName, completedBy: currentUser, date: today });
}

// ── NEXT UP ──
function renderNextUp() {
  processChores(); // re-calc which is next up (after completions)
  const list = document.getElementById('next-up-list');
  if (nextUpChores.length === 0) {
    list.innerHTML = '<div style="font-size:13px;color:var(--muted);text-align:center;padding:16px 0;">All chores are either done or due today!</div>';
    return;
  }
  list.innerHTML = nextUpChores.map(chore => {
    const d = chore.daysUntil;
    const dueLabel = d === 0 ? 'Today' : d === 1 ? 'Tomorrow' : `In ${d} days`;
    const isOverdue = d === 0;
    const last = chore.lastCompletion;
    const lastSub = last ? `${chore.frequency} · Last: ${last.completedBy}, ${formatDaysAgo(last.date)}` : chore.frequency;
    return `<div class="next-up-item">
      <div class="nup-info">
        <div class="nup-name">${chore.name}</div>
        <div class="nup-sub">${lastSub}</div>
      </div>
      <div class="nup-due ${isOverdue ? 'overdue' : ''}">${dueLabel}</div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════
// RENDER HISTORY
// ══════════════════════════════════════════════════
function renderHistory() {
  document.getElementById('history-loading').style.display = 'none';
  document.getElementById('history-error').style.display = 'none';
  const content = document.getElementById('history-content');
  content.style.display = 'flex';

  // Count completions per person
  let sarahCount = 0, anthonyCount = 0;
  for (const c of completionLog) {
    if (c.completedBy === 'Sarah') sarahCount++;
    else if (c.completedBy === 'Anthony') anthonyCount++;
  }
  const total = sarahCount + anthonyCount || 1;
  const sarahPct = Math.round((sarahCount / total) * 100);
  const anthonyPct = 100 - sarahPct;

  // Per-chore breakdown
  const choreStats = {};
  for (const chore of allChores) {
    choreStats[chore.name] = { sarah: 0, anthony: 0, lastDate: null, freq: chore.frequency };
  }
  const sortedLog = [...completionLog].sort((a, b) => new Date(b.date) - new Date(a.date));
  for (const c of sortedLog) {
    if (!choreStats[c.chore]) choreStats[c.chore] = { sarah: 0, anthony: 0, lastDate: null, freq: '' };
    if (c.completedBy === 'Sarah') choreStats[c.chore].sarah++;
    else if (c.completedBy === 'Anthony') choreStats[c.chore].anthony++;
    if (!choreStats[c.chore].lastDate) choreStats[c.chore].lastDate = c.date;
  }

  const breakdownRows = Object.entries(choreStats).map(([name, s]) => {
    const t = s.sarah + s.anthony;
    const lastText = s.lastDate ? formatDaysAgo(s.lastDate) : 'never';
    return `<div class="bd-row">
      <div>
        <div class="bd-name">${name}</div>
        <div class="bd-freq">${s.freq} · Last: ${lastText}</div>
      </div>
      <div class="bd-cell"><span class="pill pill-s">${s.sarah}</span></div>
      <div class="bd-cell"><span class="pill pill-a">${s.anthony}</span></div>
      <div class="bd-cell">${t}<small>times</small></div>
    </div>`;
  }).join('');

  content.innerHTML = `
    <div class="section-label">All-Time Score</div>
    <div class="tally-row">
      <div class="tally-card sarah">
        <div class="tally-person"><div class="tally-av">S</div><span class="tally-pname">Sarah</span></div>
        <div class="tally-num">${sarahCount}</div>
        <div class="tally-sub">Chores done</div>
        <div class="tally-bar-bg"><div class="tally-bar-fill" style="width:${sarahPct}%;"></div></div>
      </div>
      <div class="tally-card anthony">
        <div class="tally-person"><div class="tally-av">A</div><span class="tally-pname">Anthony</span></div>
        <div class="tally-num">${anthonyCount}</div>
        <div class="tally-sub">Chores done</div>
        <div class="tally-bar-bg"><div class="tally-bar-fill" style="width:${anthonyPct}%;"></div></div>
      </div>
    </div>
    <div class="split-wrap">
      <div class="split-label">Share of work</div>
      <div class="split-bar">
        <div class="split-s" style="flex:${sarahCount || 1};"></div>
        <div class="split-a" style="flex:${anthonyCount || 1};"></div>
      </div>
      <div class="split-labels">
        <span class="split-name" style="color:var(--black);">Sarah ${sarahPct}%</span>
        <span class="split-name" style="color:var(--violet);">Anthony ${anthonyPct}%</span>
      </div>
    </div>
    <div class="section-label">Task Breakdown</div>
    <div class="breakdown">
      <div class="bd-head">
        <span class="bd-hcol">Task</span>
        <span class="bd-hcol">Sarah</span>
        <span class="bd-hcol">Anthony</span>
        <span class="bd-hcol">Total</span>
      </div>
      ${breakdownRows || '<div class="bd-row" style="grid-column:1/-1;color:var(--muted);font-size:13px;">No completions yet</div>'}
    </div>
  `;
}

// ══════════════════════════════════════════════════
// TIMER
// ══════════════════════════════════════════════════
function toggleTimer() {
  if (timerRunning) {
    pauseTimer();
  } else {
    startTimer();
  }
}

function startTimer() {
  timerRunning = true;
  document.getElementById('timer-hint').textContent = 'Sprint in progress…';
  document.getElementById('timer-icon').innerHTML = '<rect x="3" y="2" width="4" height="18" rx="1" fill="white"/><rect x="11" y="2" width="4" height="18" rx="1" fill="white"/>';
  timerInterval = setInterval(() => {
    timerSeconds--;
    if (timerSeconds <= 0) {
      timerSeconds = 0;
      clearInterval(timerInterval);
      timerRunning = false;
      document.getElementById('timer-hint').textContent = 'Great sprint! 🎉';
      document.getElementById('timer-icon').innerHTML = '<path d="M1 1.5L17 11L1 20.5V1.5Z" fill="white"/>';
      showToast('⏱ 15 minute sprint complete!');
      timerSeconds = 15 * 60;
      setTimeout(() => updateTimerDisplay(), 3000);
    }
    updateTimerDisplay();
  }, 1000);
}

function pauseTimer() {
  timerRunning = false;
  clearInterval(timerInterval);
  document.getElementById('timer-hint').textContent = 'Paused — tap to resume';
  document.getElementById('timer-icon').innerHTML = '<path d="M1 1.5L17 11L1 20.5V1.5Z" fill="white"/>';
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  document.getElementById('timer-display').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const pct = ((15*60 - timerSeconds) / (15*60)) * 100;
  document.getElementById('timer-bar').style.width = pct + '%';
  if (timerSeconds === 15*60) {
    document.getElementById('timer-bar').style.width = '0%';
    document.getElementById('timer-display').textContent = '15:00';
    document.getElementById('timer-hint').textContent = 'Tap to start your chore sprint';
  }
}

// ══════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════
let toastTimeout;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
